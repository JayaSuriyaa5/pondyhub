name: pondyhub

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forum_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forum_password}
      POSTGRES_DB: ${POSTGRES_DB:-forum_db}
    volumes:
      - pondyhub_db_data:/var/lib/postgresql/data
    ports:
      # Exposed on the host for local debugging (psql, Prisma Studio
      # pointed at localhost). Remove this mapping in environments where
      # the database should only be reachable from other containers on
      # the internal network.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forum_user} -d ${POSTGRES_DB:-forum_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - pondyhub_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://${POSTGRES_USER:-forum_user}:${POSTGRES_PASSWORD:-forum_password}@db:5432/${POSTGRES_DB:-forum_db}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    volumes:
      # Persist uploaded avatars outside the container so they survive
      # `docker compose up --build` rebuilds (the image itself is
      # rebuilt from scratch each time, which would otherwise wipe any
      # files written to public/avatars at runtime).
      - pondyhub_avatars:/app/public/avatars
    networks:
      - pondyhub_network

volumes:
  pondyhub_db_data:
  pondyhub_avatars:

networks:
  pondyhub_network:
    driver: bridge
